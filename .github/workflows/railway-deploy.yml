# Manual deploy: GitHub → Actions → "Railway deploy" → Run workflow
# Requires repo secret: RAILWAY_TOKEN (Project token from Railway: Project → Settings → Tokens)
# If the repo is already connected in Railway, pushes to main deploy automatically — skip this job.
name: Railway deploy
on:
  workflow_dispatch:
jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
      - run: npm ci
      - name: Check Railway token
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
        run: |
          if [ -z "$RAILWAY_TOKEN" ]; then
            echo "::error::GitHub secret RAILWAY_TOKEN is not set. In Railway: Project → Settings → Tokens → create a project token, then in GitHub: Settings → Secrets → Actions → New secret → name RAILWAY_TOKEN, paste the token. Re-run this workflow."
            exit 1
          fi
      - name: Upload and deploy
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
        run: npx @railway/cli@latest up --ci
