# Railway — Config as Code (https://docs.railway.com/guides/config-as-code)
#
# Use the repo Dockerfile only. `dist-admin/` is gitignored and is produced in the
# image builder stage (`npm run build:admin`); Nixpacks-only deploys can ship without it.
#
# Dashboard UI: open /admin.html on your Railway URL (not only /).

[build]
builder = "DOCKERFILE"
dockerfilePath = "Dockerfile"

[deploy]
startCommand = "node server.js"
# If opening your Railway URL shows the marketing site (or a blank page) but the studio lives at /admin.html,
# add variable in the Railway dashboard: ADMIN_HTML_AT_ROOT=1  (redirects / and /index.html → /admin.html).
