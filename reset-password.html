<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="robots" content="noindex" />
  <title>Reset password — CustomSite</title>
  <link rel="icon" href="/favicon.ico" type="image/x-icon" />
  <link rel="stylesheet" href="css/styles.css" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <style>
    .portal-page {
      min-height: 100vh;
      background: linear-gradient(135deg, var(--dark) 0%, #1a1040 50%, #0d1f35 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem;
      position: relative;
      overflow: hidden;
    }
    .portal-bg-shapes { position: absolute; inset: 0; pointer-events: none; }
    .shape { position: absolute; border-radius: 50%; filter: blur(80px); opacity: 0.15; }
    .s1 { width: 500px; height: 500px; background: var(--primary); top: -200px; right: -100px; }
    .s2 { width: 400px; height: 400px; background: var(--secondary); bottom: -150px; left: -100px; }
    .portal-wrapper { width: 100%; max-width: 440px; position: relative; z-index: 1; }
    .portal-box {
      background: rgba(255, 255, 255, 0.06);
      backdrop-filter: blur(20px);
      border: 1px solid rgba(255, 255, 255, 0.12);
      border-radius: var(--radius-lg);
      padding: 2.75rem;
    }
    .portal-box h2 { font-size: 1.5rem; font-weight: 800; color: var(--white); margin-bottom: 0.4rem; }
    .portal-box .sub { color: rgba(255, 255, 255, 0.5); font-size: 0.9rem; margin-bottom: 1.5rem; }
    .portal-box label { color: rgba(255, 255, 255, 0.8); font-size: 0.85rem; font-weight: 600; display: block; margin-bottom: 0.35rem; }
    .portal-box input {
      width: 100%;
      background: rgba(255, 255, 255, 0.08) !important;
      border: 2px solid rgba(255, 255, 255, 0.12) !important;
      color: white !important;
      padding: 0.65rem 0.9rem;
      border-radius: 0.4rem;
      margin-bottom: 1rem;
      box-sizing: border-box;
    }
    .portal-box input::placeholder { color: rgba(255, 255, 255, 0.3); }
    .portal-box .btn { width: 100%; margin-top: 0.5rem; }
    .rp-footer { text-align: center; margin-top: 1.25rem; color: rgba(255, 255, 255, 0.45); font-size: 0.85rem; }
    .rp-footer a { color: var(--primary-light); }
    #rpMsg { min-height: 1.5rem; font-size: 0.9rem; margin-bottom: 0.75rem; }
  </style>
</head>
<body>
  <nav style="position: fixed; top: 0; left: 0; right: 0; z-index: 100; padding: 1rem 1.5rem; display: flex; justify-content: space-between; align-items: center">
    <a href="index.html" style="display: flex; align-items: center; line-height: 0" aria-label="CustomSite home">
      <img src="images/customsite-wordmark-on-dark.svg" width="200" height="40" style="height: 2.15rem; width: auto; max-width: min(12rem, 60vw); object-fit: contain" alt="CustomSite" />
    </a>
    <a href="client-portal.html" id="rpBack" style="color: rgba(255, 255, 255, 0.5); font-size: 0.85rem">Sign in</a>
  </nav>

  <div class="portal-page">
    <div class="portal-bg-shapes">
      <div class="shape s1"></div>
      <div class="shape s2"></div>
    </div>
    <div class="portal-wrapper">
      <div class="portal-box">
        <div style="text-align: center; margin-bottom: 1.25rem">
          <img
            src="images/customsite-stacked-on-dark.svg"
            width="260"
            height="98"
            style="height: 4.5rem; width: auto; max-width: 100%; object-fit: contain; filter: drop-shadow(0 4px 12px rgba(0, 0, 0, 0.35))"
            alt=""
            aria-hidden="true"
          />
        </div>
        <h2>Reset your password</h2>
        <p class="sub" id="rpSub"
          >Request a link by email, or set a new password if you already opened the link from your inbox.</p
        >
        <div id="rpMsg" data-kind="info" style="color: rgba(255, 255, 255, 0.6)"></div>

        <div id="panelEmail">
          <form id="rpRequestForm">
            <label for="rpEmail">Email</label>
            <input type="email" id="rpEmail" name="email" required autocomplete="email" placeholder="you@example.com" />
            <button type="submit" class="btn btn-primary">Send reset link</button>
          </form>
        </div>

        <div id="panelPassword" hidden>
          <form id="rpNewPassForm">
            <label for="rpNew1">New password</label>
            <input type="password" id="rpNew1" name="n1" required minlength="8" autocomplete="new-password" />
            <label for="rpNew2">Confirm password</label>
            <input type="password" id="rpNew2" name="n2" required minlength="8" autocomplete="new-password" />
            <button type="submit" class="btn btn-primary">Update password and continue</button>
          </form>
        </div>

        <p class="rp-footer"><a href="client-portal.html">Back to sign in</a> · <a href="index.html">Home</a></p>
      </div>
    </div>
  </div>

  <script type="module" src="js/auth-bootstrap.js"></script>
  <script type="module" src="js/reset-password-app.js"></script>
</body>
</html>
