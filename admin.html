<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="robots" content="noindex, nofollow" />
  <meta name="description" content="CustomSite agency operations — leads, clients, projects, billing (admin only)." />
  <link rel="icon" href="/favicon.ico" type="image/x-icon" />
  <title>Dashboard — CustomSite</title>
  <link rel="stylesheet" href="/css/main.css" />
  <link rel="stylesheet" href="/css/admin.css" />
  <link rel="stylesheet" href="/css/admin-ds.css" />
  <link rel="stylesheet" href="https://cdn.quilljs.com/1.3.6/quill.snow.css" crossorigin="anonymous" />
</head>
<body class="adm-page" id="admRoot">
  <!-- Shown by default if JS fails to load; app.js hides this when a session exists. -->
  <div
    id="admSignedOut"
    class="cs-signed-out"
    style="display: block; padding: 4rem 1.5rem; text-align: center; max-width: 40rem; margin: 0 auto; font-size: 15px; color: var(--dark, #0f172a)"
  >
    <p style="margin: 0 0 1rem">Not signed in.</p>
    <p style="margin: 0">
      <a href="/client-portal.html?agency=1" class="cs-link-a" style="color: var(--cs-accent-dark, #4f46e5); font-weight: 600">Open the client portal</a>
      and sign in with an agency account to use the admin.
    </p>
  </div>

  <div id="admApp" class="adm-app-shell" style="display: none; min-height: 100vh">
    <!-- ── SIDEBAR ──────────────────────────────────────────────── -->
    <aside id="admSidebar" class="adm-sidebar">
      <div class="adm-sb-header">
        <a href="/admin.html" class="adm-sb-logo">
          <span class="logo-mark">CS</span>
          <span class="logo-word">CustomSite</span>
        </a>
        <div id="csUserMenu" class="adm-sb-userwrap" style="position: relative">
          <div class="adm-sb-avatar" id="csUserAvatar" role="button" tabindex="0" aria-label="Account menu" aria-haspopup="true" aria-expanded="false">
            <span id="admAvatarInitials">·</span>
          </div>
          <div class="adm-avatar-menu" id="csUserMenuDd" role="menu" hidden>
            <a href="client-portal.html" role="menuitem">My account</a>
            <a href="index.html" role="menuitem">View site</a>
            <a href="dashboard.html" role="menuitem">Client view</a>
            <a href="site-builder.html" target="_blank" rel="noopener" role="menuitem">Site builder</a>
          </div>
        </div>
      </div>

      <nav class="adm-sb-nav" id="csNav" aria-label="Admin navigation">
        <p class="adm-sb-section-label">Workspace</p>
        <button type="button" class="adm-sb-item active" data-tab="dashboard" aria-selected="true">
          <span>Dashboard</span>
        </button>
        <button type="button" class="adm-sb-item" data-tab="pipeline">
          <span>Pipeline</span>
        </button>
        <button type="button" class="adm-sb-item" data-tab="clients">
          <span>Clients</span>
        </button>
        <button type="button" class="adm-sb-item" data-tab="projects">
          <span>Projects</span>
        </button>

        <p class="adm-sb-section-label">Billing</p>
        <button type="button" class="adm-sb-item" data-tab="invoices">
          <span>Invoices</span>
        </button>
        <button type="button" class="adm-sb-item" data-tab="time">
          <span>Time &amp; Billing</span>
        </button>

        <p class="adm-sb-section-label">Communication</p>
        <button type="button" class="adm-sb-item" data-tab="messages">
          <span>Messages</span>
        </button>
        <button type="button" class="adm-sb-item" data-tab="contracts">
          <span>Contracts</span>
        </button>

        <p class="adm-sb-section-label">Tools</p>
        <button type="button" class="adm-sb-item" data-tab="files">
          <span>Files</span>
        </button>
        <button type="button" class="adm-sb-item" data-tab="activity">
          <span>Activity</span>
        </button>

        <p class="adm-sb-section-label">Settings</p>
        <button type="button" class="adm-sb-item" data-tab="settings">
          <span>Settings</span>
        </button>
      </nav>

      <div class="adm-sb-footer">
        <a href="/index.html" class="adm-sb-footer-link" target="_blank" rel="noopener">View Site</a>
        <a href="/client-portal.html" class="adm-sb-footer-link" target="_blank" rel="noopener">Client Portal</a>
        <a href="site-builder.html" class="adm-sb-footer-link" target="_blank" rel="noopener">Site Builder</a>
        <button class="adm-sb-footer-link" type="button" id="admLogout">Log out</button>
      </div>
    </aside>

    <div class="adm-sb-overlay" id="admSbOverlay" hidden></div>

    <div class="adm-main" id="admMain">
      <header class="adm-mobile-bar" id="admMobileBar">
        <button class="adm-hamburger" type="button" id="admHamburger" aria-label="Open menu">☰</button>
        <h1 class="adm-mobile-title" id="admMobileTitle">Dashboard</h1>
      </header>

      <div id="admDbBanner" hidden></div>

      <div class="adm-page-header" id="admPageHeader">
        <p id="admBreadcrumb" class="cs-breadcrumb" style="font-size: 0.8rem; color: var(--gray, #64748b); margin: 0 0 0.5rem 0">CustomSite &gt; Dashboard</p>
        <div id="admDashGreetWrap" style="display: none">
          <p id="admGreeting" class="cs-greet" style="margin: 0; font-size: 1.15rem; font-weight: 600"></p>
          <p id="admSubDate" style="margin: 0.25rem 0 0 0; font-size: 0.9rem; color: var(--gray, #64748b)"></p>
        </div>
        <div class="cs-page-header-row" style="display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 0.5rem">
          <h1 class="adm-page-title" id="admPageTitle">Dashboard</h1>
          <div id="admPageActions"></div>
        </div>
        <div class="cs-page-divider" id="admPageDivider" aria-hidden="true" style="height: 1px; background: var(--border, rgba(0,0,0,0.08)); margin: 1rem 0 0 0"></div>
      </div>

      <div data-panel="dashboard" class="adm-panel is-visible" id="panel-dashboard"></div>
      <div data-panel="pipeline" class="adm-panel" id="panel-pipeline" hidden></div>
      <div data-panel="clients" class="adm-panel" id="panel-clients" hidden></div>
      <div data-panel="projects" class="adm-panel" id="panel-projects" hidden></div>
      <div data-panel="invoices" class="adm-panel" id="panel-invoices" hidden></div>
      <div data-panel="time" class="adm-panel" id="panel-time" hidden></div>
      <div data-panel="messages" class="adm-panel" id="panel-messages" hidden></div>
      <div data-panel="contracts" class="adm-panel" id="panel-contracts" hidden></div>
      <div data-panel="files" class="adm-panel" id="panel-files" hidden></div>
      <div data-panel="activity" class="adm-panel" id="panel-activity" hidden></div>
      <div data-panel="settings" class="adm-panel" id="panel-settings" hidden></div>
    </div>

    <div id="admDrawerRoot"></div>
    <div id="admModalRoot"></div>

    <div id="toast-container" aria-live="polite"></div>

    <nav class="adm-bottom-bar" id="admBottomBar" aria-label="Mobile navigation">
      <button type="button" class="adm-bbar-item active" data-tab="dashboard"><span>🏠</span><span>Home</span></button>
      <button type="button" class="adm-bbar-item" data-tab="pipeline"><span>📋</span><span>Pipeline</span></button>
      <button type="button" class="adm-bbar-item" data-tab="clients"><span>👥</span><span>Clients</span></button>
      <button type="button" class="adm-bbar-item" data-tab="invoices"><span>💰</span><span>Invoices</span></button>
      <button type="button" class="adm-bbar-item" data-tab="settings"><span>⚙️</span><span>Settings</span></button>
    </nav>
  </div>

  <!-- Quick action hooks (used by app.js) -->
  <button type="button" id="csQaClient" hidden aria-hidden="true" tabindex="-1">QA Client</button>
  <button type="button" id="csQaLead" hidden aria-hidden="true" tabindex="-1">QA Lead</button>
  <button type="button" id="csQaInv" hidden aria-hidden="true" tabindex="-1">QA Inv</button>

  <script src="https://cdn.quilljs.com/1.3.6/quill.js" crossorigin="anonymous"></script>
  <script type="module" src="/js/auth-bootstrap.js"></script>
  <script type="module" src="/js/admin/app.js"></script>
</body>
</html>
