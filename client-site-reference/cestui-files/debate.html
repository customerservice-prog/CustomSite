<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Community Board — The Cestui Files</title>
<base href="./" />
<meta name="robots" content="index,follow" />
<style>
:root{--gold:#c9a84c;--dark:#0a0a0f;--dark2:#111118;--dark3:#1a1a24;--dark4:#222230;--text:#e8e8f0;--muted:#888899;--border:rgba(201,168,76,0.15)}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--dark);color:var(--text);font-family:Georgia,serif;line-height:1.7}
nav{background:rgba(10,10,15,.97);border-bottom:1px solid var(--border);position:sticky;top:0;z-index:100}
.nav-inner{max-width:900px;margin:0 auto;padding:0 24px;display:flex;align-items:center;justify-content:space-between;height:64px}
.nav-logo{font-family:"Courier New",monospace;font-size:1.1rem;color:var(--gold);text-decoration:none;letter-spacing:3px;text-transform:uppercase}
.nav-links{display:flex;gap:32px;list-style:none;font-family:"Courier New",monospace;font-size:.8rem;text-transform:uppercase;flex-wrap:wrap}
.nav-links a{color:var(--muted);text-decoration:none}
.nav-links a:focus,.nav-links a:hover{color:var(--gold)}
.page-header{background:var(--dark2);border-bottom:1px solid var(--border);padding:40px 24px}
.page-header-inner,.main{max-width:900px;margin:0 auto;padding-left:24px;padding-right:24px}
.page-header h1{font-size:clamp(1.35rem,3.5vw,1.85rem)}
.page-header p{margin-top:12px;color:var(--muted);font-size:.95rem}
#localBanner{display:none;background:rgba(201,168,76,.08);border:1px solid var(--border);color:var(--muted);padding:14px 20px;margin:-1px auto 0;max-width:900px;font-size:.82rem;font-family:"Courier New",monospace;line-height:1.5;border-radius:0 0 6px 6px}
#localBanner.on{display:block;margin-bottom:28px;margin-top:16px;margin-left:auto;margin-right:auto}
.main{padding:32px 24px 80px}
.composer{margin-bottom:32px;background:var(--dark3);border:1px solid var(--border);border-radius:8px;padding:20px}
.composer label{display:block;font-size:.72rem;font-family:"Courier New",monospace;color:var(--gold);letter-spacing:.08em;text-transform:uppercase;margin-bottom:10px}
.composer input{width:100%;max-width:360px;background:var(--dark4);border:1px solid var(--border);color:var(--text);padding:10px 12px;margin-bottom:16px;font-size:.95rem;border-radius:4px}
.composer textarea{width:100%;min-height:120px;background:var(--dark4);border:1px solid var(--border);color:var(--text);padding:12px;margin-bottom:16px;font-family:inherit;font-size:.95rem;border-radius:4px;resize:vertical}
.composer button,.post-actions button{border:1px solid var(--border);background:rgba(201,168,76,.14);color:var(--gold);cursor:pointer;font-family:"Courier New",monospace;text-transform:uppercase;font-size:.68rem;padding:10px 18px;border-radius:4px;letter-spacing:.06em}
.composer button:disabled,.post-actions button:disabled{opacity:.45;cursor:not-allowed}
.composer button:hover:not(:disabled),.post-actions button:hover:not(:disabled){border-color:var(--gold)}
#feedError{color:#ff8a80;font-size:.88rem;margin-bottom:16px;display:none;font-family:"Courier New",monospace}
#feedError.show{display:block}
.post{background:var(--dark3);border:1px solid var(--border);border-radius:8px;margin-bottom:20px;overflow:hidden}
.post-head{padding:14px 16px;display:flex;align-items:flex-start;gap:14px;background:rgba(17,17,24,.7);border-bottom:1px solid var(--border)}
.post-avatar{flex-shrink:0;width:40px;height:40px;border-radius:50%;background:linear-gradient(145deg,var(--gold),#856a26);display:flex;align-items:center;justify-content:center;color:var(--dark);font:bold .95rem "Courier New",monospace}
.post-meta{flex:1}
.post-author{font-size:.92rem;color:var(--text)}
.post-when{font-size:.72rem;color:var(--muted);font-family:"Courier New",monospace;margin-top:2px}
.post-body{padding:16px;color:var(--text);white-space:pre-wrap;word-break:break-word;font-size:.95rem}
.comments-area{border-top:1px solid var(--border);background:var(--dark2)}
.comments-toggle{font-family:"Courier New",monospace;font-size:.7rem;color:var(--gold);cursor:pointer;display:block;width:100%;text-align:left;padding:10px 16px;background:transparent;border:none;border-bottom:1px solid var(--border)}
.comments-toggle:focus,.comments-toggle:hover{background:rgba(201,168,76,.06)}
.comments-list{padding:12px 16px 16px;display:none}
.comments-list.open{display:block}
.comment{margin-bottom:14px;display:flex;gap:10px;align-items:flex-start}
.comment:last-child{margin-bottom:0}
.comment-dot{width:28px;height:28px;border-radius:50%;background:var(--dark4);flex-shrink:0;display:flex;align-items:center;justify-content:center;font:bold .72rem "Courier New",monospace;color:var(--gold)}
.comment-bubble{background:var(--dark4);padding:10px 12px;border-radius:8px;border:1px solid var(--border);flex:1;min-width:0}
.comment-top{display:flex;flex-wrap:wrap;justify-content:space-between;gap:8px;margin-bottom:4px}
.comment-name{font-size:.82rem;color:var(--text)}
.comment-when{font-size:.65rem;color:var(--muted);font-family:"Courier New",monospace}
.comment-text{font-size:.86rem;color:var(--muted);white-space:pre-wrap;word-break:break-word}
.comment-compose{margin-top:12px;display:flex;flex-wrap:wrap;gap:10px}
.comment-compose input{flex:1;min-width:140px;max-width:220px;background:var(--dark3);border:1px solid var(--border);color:var(--text);padding:8px 10px;border-radius:4px;font-size:.86rem}
.comment-compose textarea{flex:1 1 100%;min-height:64px;background:var(--dark3);border:1px solid var(--border);color:var(--text);padding:10px;border-radius:4px;font-size:.88rem;font-family:inherit;resize:vertical}
.post-actions{padding:12px 16px;border-top:1px solid var(--border);display:flex;flex-wrap:wrap;gap:10px}
.post-actions span{font-size:.74rem;color:var(--muted);font-family:"Courier New",monospace;display:inline-flex;align-items:center;margin-right:auto}
.loader{color:var(--muted);padding:28px;text-align:center;font-size:.92rem;font-family:"Courier New",monospace;display:none}
.loader.on{display:block}
@media (max-width:520px){.nav-inner{padding:0 16px;height:auto;min-height:64px;padding-top:12px;padding-bottom:12px;flex-wrap:gap;gap:14px}}
</style>
</head>
<body>
<nav><div class="nav-inner"><a href="index.html" class="nav-logo">CESTUI FILES</a>
<ul class="nav-links"><li><a href="index.html">Home</a></li><li><a href="videos.html">Videos</a></li><li><a href="debate.html">Debate</a></li></ul></div></nav>

<div class="page-header"><div class="page-header-inner">
<h1>Community debate</h1>
<p>Open discussion — viewpoints, cites, respectful pushback.</p></div></div>

<div id="localBanner">Local mode · posts saved in this browser only. Set your Supabase anon key in the script (<code>SUPABASE_ANON_KEY</code>) so everyone sees the same board.</div>

<main class="main">
<section class="composer"><div>
<label for="authorName">You are posting as</label>
<input id="authorName" type="text" maxlength="120" placeholder="Name (optional)" />
<label for="postContent">New post</label>
<textarea id="postContent" maxlength="8000" placeholder="Thoughts…"></textarea>
<button id="publishBtn" type="button">Publish</button>
</div></section>
<p id="feedError"></p>
<div id="feedLoader" class="loader">Loading…</div>
<div id="feed"></div>
</main>

<script>
'use strict';

/** Paste your project's anon key from Supabase → Settings → API (public JWT). Leaving the placeholder disables shared mode. */

var SUPABASE_URL = 'https://awpmraducedwbabeunxl.supabase.co';
var SUPABASE_ANON_KEY = 'REPLACE_WITH_SUPABASE_ANON_KEY';
var USE_SUPABASE = typeof SUPABASE_ANON_KEY === 'string' &&
  SUPABASE_ANON_KEY.indexOf('REPLACE') === -1 &&
  SUPABASE_ANON_KEY.trim().length > 20;

var LS_POSTS_KEY = 'cestui_debate_posts_v1';

function escapeHtml(x) {
  return String(x == null ? '' : x)
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;');
}

function initialsFrom(name) {
  var s = String(name || '').trim().slice(0, 1).toUpperCase();
  return s || '?';
}

function sbHeaders(pref) {
  var h = {
    apikey: SUPABASE_ANON_KEY,
    Authorization: 'Bearer ' + SUPABASE_ANON_KEY,
    'Content-Type': 'application/json'
  };
  if (pref) {
    Object.keys(pref).forEach(function (k) { h[k] = pref[k]; });
  }
  return h;
}

function showFeedError(msg) {
  var el = document.getElementById('feedError');
  if (!msg) {
    el.classList.remove('show');
    el.textContent = '';
    return;
  }
  el.textContent = msg;
  el.classList.add('show');
}

function toggleLocalBanner(on) {
  var b = document.getElementById('localBanner');
  if (!b) return;
  b.classList.toggle('on', !!on && !USE_SUPABASE);
}

function readLocalPosts() {
  try {
    var raw = localStorage.getItem(LS_POSTS_KEY);
    if (!raw) return [];
    var arr = JSON.parse(raw);
    return Array.isArray(arr) ? arr : [];
  } catch (e) {
    return [];
  }
}

function writeLocalPosts(posts) {
  try {
    localStorage.setItem(LS_POSTS_KEY, JSON.stringify(posts));
  } catch (e) { /* */ }
}

function sortByCreatedDesc(rows) {
  return rows.slice().sort(function (a, b) {
    return new Date(b.created_at) - new Date(a.created_at);
  });
}

async function sbFetchPosts() {
  var u = SUPABASE_URL + '/rest/v1/debate_posts?select=*&order=created_at.desc';
  var r = await fetch(u, { headers: sbHeaders(), cache: 'no-store' });
  if (!r.ok) throw new Error(await r.text() || r.statusText);
  return sortByCreatedDesc(await r.json());
}

async function sbFetchComments() {
  var u = SUPABASE_URL + '/rest/v1/debate_comments?select=*&order=created_at.asc';
  var r = await fetch(u, { headers: sbHeaders(), cache: 'no-store' });
  if (!r.ok) throw new Error(await r.text() || r.statusText);
  return await r.json();
}

function attachCommentsToPosts(posts, comments) {
  var byPid = {};
  comments.forEach(function (c) {
    var pid = c.post_id;
    if (!byPid[pid]) byPid[pid] = [];
    byPid[pid].push(c);
  });
  return posts.map(function (p) {
    return Object.assign({}, p, { _comments: byPid[p.id] || [] });
  });
}

async function loadPostsModel() {
  if (USE_SUPABASE) {
    var posts = await sbFetchPosts();
    var cm = await sbFetchComments();
    return attachCommentsToPosts(posts, cm);
  }
  var local = readLocalPosts();
  return sortByCreatedDesc(local.map(function (p) {
    var c = Array.isArray(p.comments) ? p.comments.slice() : [];
    return Object.assign({}, p, { _comments: c });
  }));
}

async function refreshFeed() {
  var loader = document.getElementById('feedLoader');
  var feed = document.getElementById('feed');
  showFeedError('');
  if (loader) loader.classList.add('on');
  try {
    var model = await loadPostsModel();
    renderFeed(sortByCreatedDesc(model));
  } catch (e) {
    showFeedError('Could not load feed: ' + (e.message || String(e)));
    feed.innerHTML = '';
  }
  if (loader) loader.classList.remove('on');
}

function renderFeed(model) {
  var feed = document.getElementById('feed');
  if (!model.length) {
    feed.innerHTML = '<p style="color:var(--muted);font-size:.95rem">No posts yet. Start the debate.</p>';
    return;
  }
  feed.innerHTML = '';
  model.forEach(function (p) { feed.appendChild(postEl(p)); });
}

function postEl(post) {
  var article = document.createElement('article');
  article.className = 'post';
  article.setAttribute('data-post-id', post.id);

  var head = document.createElement('div');
  head.className = 'post-head';
  head.innerHTML =
    '<div class="post-avatar">' + escapeHtml(post.author_initial) + '</div>' +
    '<div class="post-meta">' +
    '<div class="post-author">' + escapeHtml(post.author_name || 'Anonymous') + '</div>' +
    '<div class="post-when">' +
    escapeHtml(new Date(post.created_at).toLocaleString(undefined, {
      dateStyle: 'medium', timeStyle: 'short'
    })) +
    '</div></div>';
  article.appendChild(head);

  var body = document.createElement('div');
  body.className = 'post-body';
  body.textContent = post.content || '';
  article.appendChild(body);

  var comments = Array.isArray(post._comments)
    ? post._comments.slice()
    : [];

  var area = document.createElement('div');
  area.className = 'comments-area';

  var toggleBtn = document.createElement('button');
  toggleBtn.type = 'button';
  toggleBtn.className = 'comments-toggle';
  toggleBtn.innerHTML =
    'Discussion&nbsp;·&nbsp;' + comments.length +
    '&nbsp;(click)';

  var list = document.createElement('div');
  list.className = 'comments-list';

  toggleBtn.onclick = function () {
    list.classList.toggle('open');
    toggleBtn.setAttribute(
      'aria-expanded',
      list.classList.contains('open') ? 'true' : 'false'
    );
  };

  comments.forEach(function (c) {
    list.appendChild(commentRow(c));
  });

  var composeWrap = document.createElement('div');
  composeWrap.className = 'comment-compose';
  var nm = document.createElement('input');
  nm.type = 'text';
  nm.maxLength = 120;
  nm.placeholder = 'Name (optional)';
  nm.dataset.role = 'cmt-name';

  var tx = document.createElement('textarea');
  tx.placeholder = 'Reply…';
  tx.maxLength = 4000;

  var send = document.createElement('button');
  send.type = 'button';
  send.textContent = 'Reply';
  send.onclick = async function () {
    send.disabled = true;
    try {
      await submitComment(post.id, nm.value, tx.value);
      tx.value = '';
      nm.value = '';
      await refreshFeed();
    } catch (err) {
      showFeedError(
        String(err.message || err)
      );
    }
    send.disabled = false;
  };

  composeWrap.appendChild(nm);
  composeWrap.appendChild(tx);
  composeWrap.appendChild(send);

  list.appendChild(composeWrap);
  area.appendChild(toggleBtn);
  area.appendChild(list);

  article.appendChild(area);

  var act = document.createElement('div');
  act.className = 'post-actions';
  act.innerHTML = '<span>♥</span>';

  var likeBtn = document.createElement('button');
  likeBtn.type = 'button';
  likeBtn.textContent = String(post.likes || 0) + ' likes';
  likeBtn.onclick = async function () {
    likeBtn.disabled = true;
    try {
      await likePost(post);
      await refreshFeed();
    } catch (err) {
      showFeedError(String(err.message || err));
      likeBtn.disabled = false;
      return;
    }
    likeBtn.disabled = false;
  };
  act.appendChild(likeBtn);
  article.appendChild(act);

  return article;
}

function commentRow(c) {
  var wrap = document.createElement('div');
  wrap.className = 'comment';
  var left = document.createElement('div');
  left.className = 'comment-dot';
  left.textContent = initialsFrom(String(c.author_initial || c.author_name || 'A'));

  var bubble = document.createElement('div');
  bubble.className = 'comment-bubble';
  bubble.innerHTML =
    '<div class="comment-top">' +
    '<span class="comment-name">' +
    escapeHtml(c.author_name || 'Anonymous') +
    '</span>' +
    '<span class="comment-when">' +
    escapeHtml(new Date(c.created_at).toLocaleString(undefined, {
      dateStyle: 'short', timeStyle: 'short'
    })) +
    '</span></div>' +
    '<div class="comment-text"></div>';
  bubble.querySelector('.comment-text').textContent = c.content || '';

  var like = document.createElement('button');
  like.type = 'button';
  like.style.marginTop = '10px';
  like.style.fontSize = '.65rem';
  like.textContent = String(c.likes || 0) + ' ♥';

  like.onclick = async function () {
    like.disabled = true;
    try {
      await likeComment(c);
      await refreshFeed();
    } catch (err) {
      showFeedError(String(err.message || err));
    }
    like.disabled = false;
  };
  bubble.appendChild(like);

  wrap.appendChild(left);
  wrap.appendChild(bubble);
  return wrap;
}

async function likePost(post) {
  var next = Number(post.likes || 0) + 1;
  if (!USE_SUPABASE) {
    var all = readLocalPosts();
    all.forEach(function (p, i, a) {
      if (String(p.id) === String(post.id)) a[i] = Object.assign({}, p, { likes: next });
    });
    writeLocalPosts(sortByCreatedDesc(all));
    return;
  }
  var url =
    SUPABASE_URL +
    '/rest/v1/debate_posts?id=eq.' +
    encodeURIComponent(post.id);
  var r = await fetch(url, {
    method: 'PATCH',
    headers: sbHeaders({
      Prefer: 'return=minimal'
    }),
    body: JSON.stringify({ likes: next })
  });
  if (!r.ok) throw new Error(await r.text() || r.statusText);
}

async function likeComment(comment) {
  var next = Number(comment.likes || 0) + 1;
  if (!USE_SUPABASE) {
    var all = readLocalPosts();
    outer: for (var i = 0; i < all.length; i++) {
      var coms = Array.isArray(all[i].comments) ? all[i].comments : [];
      for (var j = 0; j < coms.length; j++) {
        if (String(coms[j].id) === String(comment.id)) {
          coms[j] = Object.assign({}, coms[j], { likes: next });
          break outer;
        }
      }
    }
    writeLocalPosts(all);
    return;
  }
  var url =
    SUPABASE_URL +
    '/rest/v1/debate_comments?id=eq.' +
    encodeURIComponent(comment.id);
  var r = await fetch(url, {
    method: 'PATCH',
    headers: sbHeaders({ Prefer: 'return=minimal' }),
    body: JSON.stringify({ likes: next })
  });
  if (!r.ok) throw new Error(await r.text() || r.statusText);
}

async function publishPost(rawName, content) {
  var nameRaw = rawName.trim() || 'Anonymous';
  var init = initialsFrom(rawName.trim() ? rawName.trim() : 'Anonymous');
  if (!USE_SUPABASE) {
    var id = 'local-' + Date.now() + '-' + Math.random().toString(36).slice(2, 7);
    var row = {
      id: id,
      author_name: nameRaw.slice(0, 120),
      author_initial: init,
      content: content,
      likes: 0,
      created_at: new Date().toISOString(),
      comments: []
    };
    var all = sortByCreatedDesc([row].concat(readLocalPosts()));
    writeLocalPosts(all);
    return;
  }

  var r = await fetch(SUPABASE_URL + '/rest/v1/debate_posts', {
    method: 'POST',
    headers: sbHeaders({
      Prefer: 'return=minimal'
    }),
    body: JSON.stringify({
      author_name: nameRaw.slice(0, 120),
      author_initial: init,
      content: content
    })
  });

  if (!r.ok) throw new Error(await r.text() || r.statusText);
}

async function submitComment(postId, rawName, text) {
  var body = String(text || '').trim();
  if (!body.length) throw new Error('Reply cannot be empty.');
  var nameRaw = rawName.trim() || 'Anonymous';
  var init = initialsFrom(rawName.trim() ? rawName.trim() : 'Anonymous');
  if (!USE_SUPABASE) {
    var all = readLocalPosts();
    var id = 'local-c-' + Date.now() + '-' + Math.random().toString(36).slice(2, 7);
    all.forEach(function (p, i, a) {
      if (String(p.id) === String(postId)) {
        var c = Array.isArray(p.comments) ? p.comments.slice() : [];
        c.push({
          id: id,
          post_id: postId,
          author_name: nameRaw.slice(0, 120),
          author_initial: init,
          content: body,
          likes: 0,
          created_at: new Date().toISOString()
        });
        a[i] = Object.assign({}, p, { comments: c });
      }
    });
    writeLocalPosts(all);
    return;
  }

  var r = await fetch(SUPABASE_URL + '/rest/v1/debate_comments', {
    method: 'POST',
    headers: sbHeaders({
      Prefer: 'return=minimal'
    }),
    body: JSON.stringify({
      post_id: postId,
      author_name: nameRaw.slice(0, 120),
      author_initial: init,
      content: body
    })
  });

  if (!r.ok) throw new Error(await r.text() || r.statusText);
}

document.getElementById('publishBtn').onclick = async function () {
  var btn = document.getElementById('publishBtn');
  var nameIn = document.getElementById('authorName');
  var contentIn = document.getElementById('postContent');

  showFeedError('');

  var content = contentIn.value.trim();
  if (content.length < 1) return;

  btn.disabled = true;

  try {
    await publishPost(nameIn.value, content);
    contentIn.value = '';
    await refreshFeed();
  } catch (err) {
    showFeedError(String(err.message || err));
  }
  btn.disabled = false;
};

var feedDebounce;
function scheduleFeedReload() {
  clearTimeout(feedDebounce);
  feedDebounce = setTimeout(function () {
    refreshFeed();
  }, 320);
}

(async function bootstrap() {
  toggleLocalBanner(!USE_SUPABASE);
  await refreshFeed();
  if (USE_SUPABASE) subscribeDebateRealtime();
})();

async function subscribeDebateRealtime() {

  var add = document.createElement('script');
  add.src =
    'https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.49.1/dist/umd/supabase.min.js';
  add.async = true;
  add.onload = function () {
    try {

      var g = typeof window.supabase !== 'undefined' ? window.supabase : null;

      if (!g || typeof g.createClient !== 'function') return;

      var client = g.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

      var ch = client.channel('debate_live');
      [
        { ev: 'INSERT', table: 'debate_posts' },
        { ev: 'UPDATE', table: 'debate_posts' },
        { ev: 'INSERT', table: 'debate_comments' },
        { ev: 'UPDATE', table: 'debate_comments' }
      ].forEach(function (cfg) {
        ch.on(
          'postgres_changes',
          { event: cfg.ev, schema: 'public', table: cfg.table },
          scheduleFeedReload
        );
      });
      ch.subscribe();
    } catch (e) {

      console.warn('[debate] realtime inactive', e);
    }

  };

  document.head.appendChild(add);
}


document.addEventListener('visibilitychange', function () {

  if (document.visibilityState === 'visible' && USE_SUPABASE) refreshFeed();

});
</script>

</body>
</html>
