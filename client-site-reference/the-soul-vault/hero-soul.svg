<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 460 740" width="460" height="740" role="img" aria-label="Human figure with soul energy from the solar plexus">
  <defs>
    <radialGradient id="skin" cx="38%" cy="28%" r="55%">
      <stop offset="0%" stop-color="#f2d6c2"/><stop offset="45%" stop-color="#c09078"/><stop offset="100%" stop-color="#5c3e36"/>
    </radialGradient>
    <radialGradient id="orb" cx="40%" cy="40%" r="60%">
      <stop offset="0%" stop-color="#fff"/><stop offset="20%" stop-color="#c5edff"/><stop offset="45%" stop-color="#4397ff"/>
      <stop offset="72%" stop-color="#1a42d4"/><stop offset="100%" stop-color="rgba(26,66,212,0)"/>
    </radialGradient>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="3.5" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="rim" x="-10%" y="-8%" width="120%" height="115%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="4" result="z"/>
      <feFlood flood-color="#6ec6ff" flood-opacity="0.5" result="f"/>
      <feComposite in="f" in2="z" operator="in" result="g"/>
      <feMerge><feMergeNode in="g"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="rayF"><feGaussianBlur stdDeviation="2.2"/></filter>
  </defs>
  <style>
    @keyframes op{0%,100%{transform:scale(1);opacity:1}50%{transform:scale(1.06);opacity:.92}}
    @keyframes rp{0%{opacity:.5;r:40}100%{opacity:0;r:105}}
    .orbG{animation:op 3.1s ease-in-out infinite;transform-origin:230px 302px}
    .rp1{animation:rp 2.3s ease-out infinite}.rp2{animation:rp 2.3s ease-out .75s infinite}.rp3{animation:rp 2.3s ease-out 1.5s infinite}
  </style>
