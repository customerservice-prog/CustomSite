<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Videos — The Soul Vault</title>
  <link rel="stylesheet" href="site.css" />
</head>
<body class="page-videos">
  <nav class="site-nav">
    <div class="nav-inner">
      <a class="nav-brand" href="index.html">The Soul Vault</a>
      <button type="button" class="nav-toggle" aria-label="Menu" onclick="this.closest('.site-nav').classList.toggle('open')">Menu</button>
      <ul class="nav-links">
        <li><a href="index.html" onclick="this.closest('nav').classList.remove('open')">Home</a></li>
        <li><a href="the-three-kingdoms.html" onclick="this.closest('nav').classList.remove('open')">Three Kingdoms</a></li>
        <li><a href="cestui-que-vie.html" onclick="this.closest('nav').classList.remove('open')">Cestui Que Vie</a></li>
        <li><a href="papal-bulls.html" onclick="this.closest('nav').classList.remove('open')">Papal Bulls</a></li>
        <li><a href="reclaim.html" onclick="this.closest('nav').classList.remove('open')">Reclaim</a></li>
        <li><a href="videos.html" onclick="this.closest('nav').classList.remove('open')">Videos</a></li>
        <li><a href="contact.html" onclick="this.closest('nav').classList.remove('open')">Contact</a></li>
      </ul>
    </div>
  </nav>

  <header class="page-header-vs reveal-section">
    <h1>Video Library</h1>
    <p>Curated in eight categories — local thumbnails cached under /thumbs/ with YouTube fallback.</p>
  </header>

  <div class="videos-toolbar">
    <div class="videos-toolbar-inner">
      <div class="videos-search-row">
        <input id="videosSearch" type="search" placeholder="Search title or author…" autocomplete="off" />
        <span id="videosCountBadge" class="videos-count-badge">—</span>
      </div>
      <div id="videosFilterButtons" class="cat-filters reveal-section"></div>
    </div>
  </div>

  <main class="videos-main">
    <div id="videosCatalog" class="videos-catalog reveal-section"></div>
  </main>

  <footer class="footer-site">
    <div class="footer-inner">
      <div><h3>Site</h3><a href="index.html">Home</a><a href="contact.html">Contact</a></div>
    </div>
  </footer>

  <div id="vidModalOverlay" class="vid-modal" aria-hidden="true" role="dialog">
    <div class="vid-modal-box">
      <div class="vid-modal-head">
        <span id="vidModalTitle">—</span>
        <button type="button" onclick="closeVidModal()" aria-label="Close">✕</button>
      </div>
      <div class="vid-frame-wrap">
        <iframe id="vidModalIframe" title="Video" allowfullscreen="" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share" referrerpolicy="strict-origin-when-cross-origin"></iframe>
        <div id="vidModalArchived" class="vid-archived-msg"></div>
      </div>
    </div>
  </div>

  <script src="site-ui.js" defer=""></script>
  <script src="vid-modal.js" defer=""></script>
  <script src="videos-page.js" defer=""></script>
</body>
</html>
