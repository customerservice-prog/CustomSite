<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="robots" content="noindex" />
    <title>Publishing — CustomSite</title>
    <link rel="icon" href="/favicon.ico" type="image/x-icon" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="/css/publish-dashboard.css" />
  </head>
  <body>
    <div id="pdErrorBanner" role="status"></div>
    <div id="pdApp">
      <header class="pd-top">
        <a href="/admin.html">← Admin</a>
        <a class="pd-brand" href="/index.html" target="_blank" rel="noopener" title="Marketing site">
          <img src="/images/customsite-wordmark-on-light.svg" width="180" height="28" alt="CustomSite" />
        </a>
        <div class="pd-grow">
          <label class="sr-only" for="pdProject">Project</label>
          <select id="pdProject" class="pd-sel" aria-label="Project"></select>
        </div>
        <div class="pd-actions">
          <button type="button" class="pd-btn" id="pdEditPage">Page settings</button>
          <button type="button" class="pd-btn" id="pdPreviewUrl">Copy preview URL</button>
          <button type="button" class="pd-btn" id="pdRefresh">Refresh pages</button>
          <button type="button" class="pd-btn" id="pdOpenMarketing">View live site</button>
          <button type="button" class="pd-btn pd-btn-primary" id="pdDeployStaging">Deploy preview</button>
          <button type="button" class="pd-btn pd-btn-primary" id="pdDeployProd">Deploy production</button>
        </div>
      </header>
      <div class="pd-domain-panel" id="pdDomainPanel">
        <div class="pd-domain-inner">
          <div class="pd-domain-field">
            <label for="pdCustomDomain">Production domain</label>
            <input type="text" id="pdCustomDomain" class="pd-input" placeholder="www.client.com (required for prod deploy)" autocomplete="off" />
          </div>
          <div class="pd-domain-field">
            <label for="pdRailwaySvc">Railway service ID</label>
            <input type="text" id="pdRailwaySvc" class="pd-input pd-mono" placeholder="Optional — from Railway service settings" autocomplete="off" />
          </div>
          <button type="button" class="pd-btn" id="pdSaveDomain">Save to server</button>
          <p class="pd-dns-hint" id="pdDnsHint"></p>
        </div>
      </div>
      <div class="pd-main">
        <aside class="pd-pages">
          <div class="pd-pages-h">Pages</div>
          <div id="pdFileList" class="pd-list"></div>
        </aside>
        <section class="pd-preview" aria-label="Preview">
          <div class="pd-preview-bar" id="pdPreviewBar">
            <span id="pdPreviewHint">Preview</span>
            <div class="pd-dv" role="group" aria-label="Preview width">
              <button type="button" data-pd="100%" class="is-on" title="Desktop width">Desktop</button>
              <button type="button" data-pd="768px" title="Tablet">Tablet</button>
              <button type="button" data-pd="390px" title="Phone">Mobile</button>
            </div>
          </div>
          <div class="pd-frame-wrap">
            <div id="pdFrameSizer">
              <iframe id="pdFrame" title="Site preview" sandbox="allow-scripts" referrerpolicy="no-referrer"></iframe>
            </div>
          </div>
        </section>
      </div>
    </div>
    <style>
      .sr-only {
        position: absolute;
        width: 1px;
        height: 1px;
        padding: 0;
        margin: -1px;
        overflow: hidden;
        clip: rect(0, 0, 0, 0);
        white-space: nowrap;
        border: 0;
      }
    </style>
    <script type="module" src="/js/auth-bootstrap.js"></script>
    <script type="module" src="/js/site-builder/publish-app.js"></script>
  </body>
</html>
