<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="robots" content="noindex" />
  <title>Site builder — CustomSite</title>
  <link rel="icon" href="/favicon.ico" type="image/x-icon" />
  <link rel="stylesheet" href="css/styles.css" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/codemirror.min.css" />
  <style>
    .sb-wrap { display: flex; flex-direction: column; min-height: 100vh; padding-top: 4.5rem; background: #0f172a; color: #e2e8f0; }
    .sb-toolbar { display: flex; flex-wrap: wrap; gap: 0.75rem; align-items: center; padding: 0.75rem 1rem; background: #1e293b; border-bottom: 1px solid rgba(255,255,255,0.08); position: fixed; top: 0; left: 0; right: 0; z-index: 100; }
    .sb-toolbar label { font-size: 0.8rem; font-weight: 600; color: #94a3b8; }
    .sb-toolbar select, .sb-toolbar input { padding: 0.4rem 0.65rem; border-radius: 0.35rem; border: 1px solid rgba(255,255,255,0.12); background: #0f172a; color: #fff; font-size: 0.85rem; max-width: 100%; }
    .sb-main { display: grid; grid-template-columns: 220px 1fr 42%; gap: 0; flex: 1; min-height: 0; }
    @media (max-width: 1100px) { .sb-main { grid-template-columns: 1fr; } .sb-preview { min-height: 40vh; } }
    .sb-files { background: #1e293b; border-right: 1px solid rgba(255,255,255,0.08); overflow-y: auto; padding: 0.75rem; }
    .sb-files h3 { font-size: 0.75rem; text-transform: uppercase; letter-spacing: 0.06em; color: #64748b; margin: 0 0 0.5rem; }
    .sb-files button.file-item { display: block; width: 100%; text-align: left; padding: 0.45rem 0.5rem; border: none; background: transparent; color: #cbd5e1; border-radius: 0.35rem; font-size: 0.85rem; cursor: pointer; font-family: inherit; }
    .sb-files button.file-item:hover, .sb-files button.file-item.active { background: rgba(99,102,241,0.2); color: #a5b4fc; }
    .sb-editor { display: flex; flex-direction: column; min-height: 0; border-right: 1px solid rgba(255,255,255,0.08); }
    .sb-editor .CodeMirror { flex: 1; height: auto !important; min-height: 400px; font-size: 13px; background: #f8fafc !important; }
    .sb-preview { background: #fff; display: flex; flex-direction: column; min-height: 0; }
    .sb-preview h3 { font-size: 0.75rem; text-transform: uppercase; letter-spacing: 0.06em; color: #64748b; margin: 0; padding: 0.5rem 0.75rem; background: #f1f5f9; color: #475569; }
    .sb-preview iframe { flex: 1; width: 100%; min-height: 400px; border: none; background: #fff; }
    .btn-sb { padding: 0.45rem 0.85rem; border-radius: 0.35rem; font-size: 0.85rem; font-weight: 600; cursor: pointer; border: none; font-family: inherit; }
    .btn-sb-primary { background: #6366f1; color: #fff; }
    .btn-sb-ghost { background: rgba(255,255,255,0.08); color: #e2e8f0; }
    .btn-sb-danger { background: rgba(239,68,68,0.2); color: #fca5a5; }
    .sb-hint { font-size: 0.75rem; color: #64748b; max-width: 36rem; }
  </style>
</head>
<body>
  <div class="sb-wrap">
    <div class="sb-toolbar">
      <a href="admin.html" style="color:#94a3b8;font-weight:600;font-size:0.85rem">← Admin</a>
      <div>
        <label for="projPick">Project</label><br/>
        <select id="projPick"></select>
      </div>
      <button type="button" class="btn-sb btn-sb-primary" id="btnSave">Save file</button>
      <button type="button" class="btn-sb btn-sb-ghost" id="btnNew">New file</button>
      <button type="button" class="btn-sb btn-sb-ghost" id="btnInit">Init starter (HTML/CSS/JS)</button>
      <button type="button" class="btn-sb btn-sb-danger" id="btnDel">Delete file</button>
      <button type="button" class="btn-sb btn-sb-ghost" id="btnRefreshPreview">Refresh preview</button>
      <span class="sb-hint">Live staging URL: <code id="previewLink" style="color:#a5b4fc"></code></span>
    </div>
    <div class="sb-main">
      <aside class="sb-files">
        <h3>Files</h3>
        <div id="fileList"></div>
      </aside>
      <section class="sb-editor">
        <textarea id="editor"></textarea>
      </section>
      <aside class="sb-preview">
        <h3>Preview (staging)</h3>
        <iframe id="previewFrame" title="Preview" sandbox="allow-scripts allow-same-origin"></iframe>
      </aside>
    </div>
  </div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/codemirror.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/mode/xml/xml.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/mode/javascript/javascript.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/mode/css/css.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/mode/htmlmixed/htmlmixed.min.js"></script>
  <script src="js/main.js"></script>
  <script>
(function () {
  const token = localStorage.getItem('customsite_access_token');
  if (!token) return;

  const hdr = { Authorization: 'Bearer ' + token, 'Content-Type': 'application/json' };
  let projectId = null;
  let currentPath = 'index.html';
  let cm = null;
  let projects = [];

  const el = document.getElementById('editor');
  cm = CodeMirror.fromTextArea(el, {
    lineNumbers: true,
    mode: 'htmlmixed',
    theme: 'default',
    indentUnit: 2,
    tabSize: 2,
  });
  cm.setSize('100%', '100%');

  function modeForPath(p) {
    if (/\.css$/i.test(p)) return 'css';
    if (/\.js$/i.test(p)) return 'javascript';
    return 'htmlmixed';
  }

  function setPreviewLink() {
    var u = location.origin + '/preview/' + projectId + '/';
    document.getElementById('previewLink').textContent = u;
  }

  function refreshPreview() {
    if (!projectId) return;
    var f = document.getElementById('previewFrame');
    f.src = '/preview/' + projectId + '/index.html?t=' + Date.now();
  }

  function loadFileList() {
    if (!projectId) return;
    fetch('/api/admin/projects/' + projectId + '/site', { headers: { Authorization: 'Bearer ' + token } })
      .then(function (r) { return r.json(); })
      .then(function (data) {
        var box = document.getElementById('fileList');
        box.innerHTML = '';
        (data.files || []).forEach(function (f) {
          var b = document.createElement('button');
          b.type = 'button';
          b.className = 'file-item' + (f.path === currentPath ? ' active' : '');
          b.textContent = f.path;
          b.addEventListener('click', function () {
            currentPath = f.path;
            loadFileContent();
            loadFileList();
          });
          box.appendChild(b);
        });
        if (!(data.files || []).length) {
          box.innerHTML = '<p style="font-size:0.8rem;color:#64748b">No files. Click <strong>Init starter</strong>.</p>';
        }
      });
  }

  function loadFileContent() {
    if (!projectId) return;
    fetch('/api/admin/projects/' + projectId + '/site/file?path=' + encodeURIComponent(currentPath), {
      headers: { Authorization: 'Bearer ' + token },
    })
      .then(function (r) {
        if (r.status === 404) {
          cm.setValue('');
          cm.setOption('mode', modeForPath(currentPath));
          return null;
        }
        return r.json();
      })
      .then(function (data) {
        if (!data) return;
        cm.setValue(data.content || '');
        cm.setOption('mode', modeForPath(currentPath));
        cm.refresh();
      });
  }

  function loadProjects() {
    fetch('/api/admin/projects', { headers: { Authorization: 'Bearer ' + token } })
      .then(function (r) { return r.json(); })
      .then(function (data) {
        projects = data.projects || [];
        var sel = document.getElementById('projPick');
        sel.innerHTML = '<option value="">Select project…</option>';
        projects.forEach(function (p) {
          var o = document.createElement('option');
          o.value = p.id;
          o.textContent = p.name + ' — ' + (p.client && p.client.email ? p.client.email : '');
          sel.appendChild(o);
        });
        var q = new URLSearchParams(location.search).get('project');
        if (q) {
          sel.value = q;
          projectId = q;
          setPreviewLink();
          loadFileList();
          loadFileContent();
          refreshPreview();
        }
        sel.addEventListener('change', function () {
          projectId = sel.value || null;
          currentPath = 'index.html';
          if (projectId) {
            setPreviewLink();
            loadFileList();
            loadFileContent();
            refreshPreview();
          }
        });
      });
  }

  document.getElementById('btnSave').addEventListener('click', function () {
    if (!projectId) { alert('Select a project.'); return; }
    fetch('/api/admin/projects/' + projectId + '/site/file', {
      method: 'PUT',
      headers: hdr,
      body: JSON.stringify({ path: currentPath, content: cm.getValue() }),
    })
      .then(function (r) { return r.json().then(function (j) { return { ok: r.ok, j: j }; }); })
      .then(function (x) {
        if (!x.ok) throw new Error(x.j.error || 'Save failed');
        loadFileList();
        refreshPreview();
      })
      .catch(function (e) { alert(e.message); });
  });

  document.getElementById('btnNew').addEventListener('click', function () {
    var p = prompt('File path (e.g. about.html or css/main.css):', '');
    if (!p) return;
    p = p.replace(/^\//, '').trim();
    if (p.includes('..')) return;
    currentPath = p;
    cm.setValue('');
    cm.setOption('mode', modeForPath(currentPath));
    loadFileList();
  });

  document.getElementById('btnInit').addEventListener('click', function () {
    if (!projectId) { alert('Select a project.'); return; }
    if (!confirm('Create or overwrite starter index.html, styles.css, app.js?')) return;
    fetch('/api/admin/projects/' + projectId + '/site/init', { method: 'POST', headers: hdr })
      .then(function (r) { return r.json().then(function (j) { return { ok: r.ok, j: j }; }); })
      .then(function (x) {
        if (!x.ok) throw new Error(x.j.error || 'Init failed');
        currentPath = 'index.html';
        loadFileList();
        loadFileContent();
        refreshPreview();
      })
      .catch(function (e) { alert(e.message); });
  });

  document.getElementById('btnDel').addEventListener('click', function () {
    if (!projectId || !currentPath) return;
    if (!confirm('Delete ' + currentPath + '?')) return;
    fetch('/api/admin/projects/' + projectId + '/site/file?path=' + encodeURIComponent(currentPath), {
      method: 'DELETE',
      headers: { Authorization: 'Bearer ' + token },
    })
      .then(function (r) {
        if (!r.ok) throw new Error('Delete failed');
        currentPath = 'index.html';
        loadFileList();
        loadFileContent();
        refreshPreview();
      })
      .catch(function (e) { alert(e.message); });
  });

  document.getElementById('btnRefreshPreview').addEventListener('click', refreshPreview);

  loadProjects();
})();
  </script>
</body>
</html>
